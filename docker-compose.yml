services:
  postgres:
    image: postgres:18-bookworm
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-xai_books}
      POSTGRES_USER: ${POSTGRES_USER:-xai_books}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-xai_books} -d ${POSTGRES_DB:-xai_books}
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  mailpit:
    image: axllent/mailpit:v1.22
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    healthcheck:
      test: [CMD, /mailpit, readyz]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    env_file:
      - ./web/.env
    environment:
      WEB_DATABASE_URL: postgresql://${POSTGRES_USER:-xai_books}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-xai_books}
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      HOSTNAME: "0.0.0.0"
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://0.0.0.0:3000/api/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres_data:
