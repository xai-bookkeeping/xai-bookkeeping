services:
  postgres:
    image: postgres:18-bookworm
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-xai_books}
      POSTGRES_USER: ${POSTGRES_USER:-xai_books}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_PORT:-5432}:${POSTGRES_CONTAINER_PORT:-5432}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-xai_books} -d ${POSTGRES_DB:-xai_books}
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://xai_books:change-me@postgres:5432/xai_books}
      API_PORT: ${API_CONTAINER_PORT:-8000}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_CONTAINER_PORT:-5432}
    ports:
      - "${API_PORT:-8000}:${API_CONTAINER_PORT:-8000}"
    volumes:
      - ./backend:/app/backend
    working_dir: /app/backend
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: >
        python -c "from urllib.request import urlopen; urlopen('http://127.0.0.1:${API_CONTAINER_PORT:-8000}/health')"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      WEB_PORT: ${WEB_CONTAINER_PORT:-5173}
    ports:
      - "${WEB_PORT:-5173}:${WEB_CONTAINER_PORT:-5173}"
    volumes:
      - ./frontend:/app/frontend
    working_dir: /app/frontend
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: >
        node -e "fetch('http://127.0.0.1:${WEB_CONTAINER_PORT:-5173}').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres_data:
